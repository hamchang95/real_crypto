services:
  redpanda:
    image: redpandadata/redpanda:v25.3.10
    volumes:
      - redpanda_data:/var/lib/redpanda/data 
    command:
      - redpanda
      - start
      - --smp
      - '1'
      - --reserve-memory
      - 0M
      - --memory
      - 1G
      - --node-id
      - '0'
      - --kafka-addr
      - PLAINTEXT://0.0.0.0:29092,OUTSIDE://0.0.0.0:9092
      - --advertise-kafka-addr
      - PLAINTEXT://redpanda:29092,OUTSIDE://localhost:9092
      - --pandaproxy-addr
      - PLAINTEXT://0.0.0.0:28082,OUTSIDE://0.0.0.0:8082
      - --advertise-pandaproxy-addr
      - PLAINTEXT://redpanda:28082,OUTSIDE://localhost:8082
      - --rpc-addr
      - 0.0.0.0:33145
      - --advertise-rpc-addr
      - redpanda:33145
    ports:
      - "8082:8082"
      - "9092:9092"
      - "28082:28082"
      - "29092:29092"
  postgres:
    image: postgres:17
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: on-failure
    environment:
      - POSTGRES_DB=postgres
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    ports:
      - "5432:5432"
  jobmanager:
    build:
      context: .
      dockerfile: ./flink/Dockerfile.flink
    image: pyflink
    restart: on-failure
    pull_policy: never
    expose:
      - "6123"
    ports:
      - "8081:8081"
    volumes:
      - ./flink/:/opt/flink/usrlib
      - ./flink/src/:/opt/src
    command: jobmanager
    environment:
      - |
        FLINK_PROPERTIES=
        jobmanager.rpc.address: jobmanager
  taskmanager:
    image: pyflink
    pull_policy: never
    restart: on-failure
    expose:
      - "6121"
      - "6122"
    volumes:
      - ./flink:/opt/flink/usrlib
      - ./flink/src/:/opt/src
    depends_on:
      - jobmanager
    command: taskmanager --taskmanager.registration.timeout 5 min
    environment:
      - |
        FLINK_PROPERTIES=
        jobmanager.rpc.address: jobmanager
        taskmanager.memory.process.size: 3200m
        taskmanager.numberOfTaskSlots: 15
        parallelism.default: 1

  streamlit:
    build:
        context: .
        dockerfile: ./streamlit/Dockerfile.streamlit
    image: streamlit
    ports:
      - "8501:8501"
    volumes:
      - ./streamlit:/app/streamlit

volumes:
  postgres_data:
  redpanda_data: